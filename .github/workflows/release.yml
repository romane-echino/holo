name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            command: npm run dist:linux
          - os: windows-latest
            platform: windows
            command: npm run dist:win
          - os: macos-latest
            platform: macos
            command: npm run dist:mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.0.0
        with:
          generate_release_notes: ${{ matrix.platform == 'linux' }}
          files: |
            release/Holo-*.exe
            release/Holo-*.dmg
            release/Holo-*.zip
            release/Holo-*.deb
          fail_on_unmatched_files: true
