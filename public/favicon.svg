<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="holo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d8bff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fond -->
  <rect width="200" height="200" fill="#1a1b1c"/>
  <!-- Cercle border -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#holo-grad)" stroke-width="2"/>
  <!-- Bloc H -->
  <rect x="45" y="50" width="45" height="50" rx="3" fill="#7B61FF" opacity="0.85"/>
  <!-- Bloc O -->
  <rect x="110" y="100" width="45" height="50" rx="3" fill="#9d8bff" opacity="0.85"/>
  <!-- Connecteur -->
  <line x1="92" y1="78" x2="115" y2="100" stroke="#7B61FF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Lettres -->
  <text x="67.5" y="87" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">H</text>
  <text x="132.5" y="137" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">O</text>
</svg>
