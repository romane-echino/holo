<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holo Link Gateway</title>
    <style>
      body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e5e7eb; margin: 0; }
      .wrap { max-width: 760px; margin: 40px auto; padding: 24px; }
      .card { border: 1px solid #2b3140; border-radius: 14px; padding: 20px; background: #141926; }
      h1 { margin-top: 0; font-size: 22px; }
      code { background: #1d2333; border: 1px solid #2b3140; padding: 2px 6px; border-radius: 6px; }
      a { color: #9d8bff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Holo Link Gateway</h1>
        <p>Cette URL sert à convertir un lien HTTPS cliquable (Teams, Slack, etc.) en ouverture de l'app Holo via <code>holo://</code>.</p>
        <p>Format attendu :</p>
        <p><code>/open?h=holo%3A%2F%2FREPO%2Ffichier.md</code></p>
        <p>Exemple :</p>
        <p><a href="/open?h=holo%3A%2F%2Fdocumentation%2FReadme.md">/open?h=holo%3A%2F%2Fdocumentation%2FReadme.md</a></p>
      </div>
    </div>
  </body>
</html>
